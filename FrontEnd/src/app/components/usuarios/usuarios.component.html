<div class="container-fluid">
    <div class="card shadow-sm mt-5">
        <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">USUARIOS</h5>
            <button class="btn btn-success btn-sm fw-bold" (click)="toggleForm()">
                <i class="fa-solid fa-plus"></i> Nuevo usuario
            </button>
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-bordered mb-0">
                <thead class="table-dark">
                    <tr style="text-align: center;">
                        <th scope="col">#</th>
                        <th scope="col">Username</th>
                        <th scope="col">Roles</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="text-align: center;" *ngFor="let usuario of listaUsuarios; let i = index">
                        <td>{{ i + 1 }}</td>
                        <td>{{ usuario.username }}</td>
                        <td>
                            <span *ngFor="let rol of usuario.roles" class="badge bg-primary me-1">
                                {{ transformarRol(rol) }}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-sm" (click)="deleteUsusario(usuario.id)">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="modal fade" #usuarioModalRef tabindex="-1" aria-labelledby="usuarioModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-md">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="usuarioModalLabel">{{ modalText }}</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form [formGroup]="usuarioForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" class="form-control" formControlName="username" minlength="5"
                                maxlength="20" placeholder="Ingrese el nombre de usuario" />
                            <div *ngIf="usuarioForm.get('username')?.invalid && usuarioForm.get('username')?.touched"
                                class="text-danger small mt-1">
                                <span *ngIf="usuarioForm.get('username')?.errors?.['required']">
                                    El username es requerido
                                </span>
                                <span *ngIf="usuarioForm.get('username')?.errors?.['minlength']">
                                    Mínimo 5 caracteres
                                </span>
                                <span *ngIf="usuarioForm.get('username')?.errors?.['maxlength']">
                                    Máximo 20 caracteres
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input id="password" type="password" class="form-control" formControlName="password"
                                minlength="8" placeholder="Ingrese la contraseña" />
                            <div *ngIf="usuarioForm.get('password')?.invalid && usuarioForm.get('password')?.touched"
                                class="text-danger small mt-1">
                                <span *ngIf="usuarioForm.get('password')?.errors?.['required']">
                                    La contraseña es requerida
                                </span>
                                <span *ngIf="usuarioForm.get('password')?.errors?.['minlength']">
                                    Mínimo 8 caracteres
                                </span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="roles" class="form-label">Roles</label>
                            <select id="roles" class="form-select" formControlName="roles">
                                <option *ngFor="let rol of roles" [value]="rol">
                                    {{ transformarRol(rol) }}
                                </option>
                            </select>
                            <div class="form-text">
                                Seleccione un rol para el usuario
                            </div>
                            <div *ngIf="usuarioForm.get('roles')?.invalid && usuarioForm.get('roles')?.touched"
                                class="text-danger small mt-1">
                                <span *ngIf="usuarioForm.get('roles')?.errors?.['required']">
                                    Al menos un rol es requerido
                                </span>
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success px-4" [disabled]="usuarioForm.invalid">
                                <i class="fa fa-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
