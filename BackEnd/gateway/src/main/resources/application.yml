spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks

  cloud:
    loadbalancer:
      enabled: true
    gateway:
      server:
        webflux:
          routes:
            - id: auth-server
              uri: lb://authorization-server
              predicates:
                - Path=/api/login/**

            - id: habitaciones
              uri: lb://habitaciones
              predicates:
                - Path=/api/habitaciones/**
              filters:
                - StripPrefix=2
            - id: huespedes
              uri: lb://huespedes
              predicates:
                - Path=/api/huespedes/**
              filters:
                - StripPrefix=2
            - id: reservas
              uri: lb://reservas
              predicates:
                - Path=/api/reservas/**
              filters:
                - StripPrefix=2
            - id: usuarios
              uri: lb://usuarios
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=2

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka