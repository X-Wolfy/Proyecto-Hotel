spring:
 application:
  name: gateway

 cloud:
  loadbalancer:
   enabled: true

  gateway:
   server:
    webflux:
     routes:
      - id: habitaciones
        uri: lb://habitaciones
        predicates:
         - Path=/api/habitaciones/**
        filters:
         - StripPrefix=2

      - id: huespedes
        uri: lb://huespedes
        predicates:
         - Path=/api/huespedes/**
        filters:
         - StripPrefix=2

      - id: reservas
        uri: lb://reservas
        predicates:
         - Path=/api/reservas/**
        filters:
         - StripPrefix=2

server:
 port: 8090

eureka:
 client:
  service-url:
   defaultZone: http://localhost:8761/eureka